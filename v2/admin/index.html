<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Elena Bakery — Administración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- Carga -->
  <div id="loadingView" class="login-wrap"><p class="muted">Cargando…</p></div>

  <!-- Login -->
  <div id="loginView" class="login-wrap hidden">
    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="brand"><h1>Elena Bakery</h1><span>Administración</span></div>
      <label for="email">Correo</label>
      <input id="email" name="email" type="email" required autocomplete="username" placeholder="tucorreo@correo.com">
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
      <button class="btn" id="loginBtn" type="submit" style="width:100%;margin-top:20px">Ingresar</button>
      <p class="msg" id="loginMsg"></p>
    </form>
  </div>

  <!-- App -->
  <div id="appView" class="layout hidden">
    <aside class="sidebar">
      <div class="logo">Elena Bakery<small>Administración</small></div>
      <nav class="nav" id="nav">
        <button data-view="dashboard" class="active"><span class="ico">▦</span> Dashboard</button>
        <button data-view="pedidos"><span class="ico">▤</span> Pedidos</button>
        <button data-view="productos"><span class="ico">▣</span> Productos</button>
        <button data-view="config"><span class="ico">⚙</span> Configuración</button>
      </nav>
      <div class="foot">
        <div id="whoEmail" class="muted"></div>
        <button class="btn btn-ghost btn-sm" id="logoutBtn" style="color:var(--crema);border-color:rgba(245,241,227,.4)">Cerrar sesión</button>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
