<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <!-- Body -->
  <ellipse cx="200" cy="340" rx="110" ry="120" fill="#fdfbf4"/>
  <!-- Tail -->
  <path d="M 295 310 Q 360 270 350 210 Q 340 180 315 190 Q 330 220 325 260 Q 310 290 295 310 Z" fill="#fdfbf4"/>
  <!-- Left ear -->
  <ellipse cx="130" cy="145" rx="55" ry="70" fill="#fdfbf4" transform="rotate(-12 130 145)"/>
  <!-- Right ear -->
  <ellipse cx="270" cy="145" rx="55" ry="70" fill="#fdfbf4" transform="rotate(12 270 145)"/>
  <!-- Head -->
  <circle cx="200" cy="185" r="105" fill="#fdfbf4"/>
  <!-- Inner left ear -->
  <ellipse cx="132" cy="143" rx="32" ry="48" fill="#ebe4cd" transform="rotate(-12 132 143)"/>
  <!-- Inner right ear -->
  <ellipse cx="268" cy="143" rx="32" ry="48" fill="#ebe4cd" transform="rotate(12 268 143)"/>
  <!-- Left eye white -->
  <circle cx="165" cy="172" r="28" fill="#ebe4cd"/>
  <!-- Right eye white -->
  <circle cx="235" cy="172" r="28" fill="#ebe4cd"/>
  <!-- Left pupil -->
  <circle cx="169" cy="175" r="16" fill="#2d3a1f"/>
  <!-- Right pupil -->
  <circle cx="239" cy="175" r="16" fill="#2d3a1f"/>
  <!-- Left eye shine -->
  <circle cx="175" cy="168" r="5" fill="#fdfbf4"/>
  <!-- Right eye shine -->
  <circle cx="245" cy="168" r="5" fill="#fdfbf4"/>
  <!-- Snout -->
  <ellipse cx="200" cy="220" rx="42" ry="32" fill="#ebe4cd"/>
  <!-- Nose -->
  <ellipse cx="200" cy="208" rx="14" ry="10" fill="#6b8348"/>
  <!-- Mouth -->
  <path d="M 188 222 Q 200 234 212 222" stroke="#6b8348" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Belly -->
  <ellipse cx="200" cy="360" rx="68" ry="80" fill="#ebe4cd"/>
  <!-- Front left leg -->
  <rect x="138" y="400" width="36" height="60" rx="18" fill="#fdfbf4"/>
  <!-- Front right leg -->
  <rect x="226" y="400" width="36" height="60" rx="18" fill="#fdfbf4"/>
  <!-- Left paw -->
  <ellipse cx="156" cy="460" rx="20" ry="12" fill="#ebe4cd"/>
  <!-- Right paw -->
  <ellipse cx="244" cy="460" rx="20" ry="12" fill="#ebe4cd"/>
  <!-- Collar -->
  <rect x="148" y="272" width="104" height="18" rx="9" fill="#c4a87a"/>
  <!-- Collar tag -->
  <circle cx="200" cy="294" r="10" fill="#c4a87a"/>
  <text x="200" y="298" font-size="10" fill="#2d3a1f" text-anchor="middle" font-family="serif" font-weight="bold">E</text>
</svg>
